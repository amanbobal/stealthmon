<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Web Logger</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <div>
          <h1>Web Logger</h1>
          <p id="stats">Loading visits...</p>
        </div>
        <div class="button-row">
          <button id="exportJsonl" type="button">JSONL</button>
          <button id="exportCsv" type="button">CSV</button>
          <button id="exportMarkdown" type="button">Markdown</button>
          <button id="importData" type="button">Import</button>
          <input id="importFile" class="visually-hidden" type="file" accept=".jsonl,.ndjson,.csv,.md,.markdown,text/csv,text/markdown,application/x-ndjson">
        </div>
      </header>

      <section class="filters" aria-label="Filters">
        <label>
          Search
          <input id="query" type="search" placeholder="URL, title, host, date">
        </label>
        <label>
          Mode
          <select id="mode">
            <option value="all">All</option>
            <option value="normal">Normal</option>
            <option value="incognito">Incognito</option>
          </select>
        </label>
        <label>
          From
          <input id="fromDate" type="date">
        </label>
        <label>
          To
          <input id="toDate" type="date">
        </label>
        <button id="last14Days" type="button">Last 14 days</button>
      </section>

      <section class="table-wrap" aria-label="Visit log">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Mode</th>
              <th>Website</th>
              <th>Screenshot</th>
              <th>ID</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>

    <script src="shared-db.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
